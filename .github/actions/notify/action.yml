name: Email and Slack Notification
description: Send email and Slack notification for CI results

inputs:
  status:
    description: 'success or failure'
    required: true
    default: 'failure'
  pipeline_name:
    required: true
  repository_name:
    required: true
  reason_or_message:
    required: true
  author:
    required: true
  smtp_server:
    required: true
  smtp_port:
    required: true
  smtp_secure:
    required: false
    default: 'true'
  smtp_username:
    required: true
  smtp_password:
    required: true
  mail_from:
    required: true
  mail_to:
    required: true
  slack_webhook:
    required: true
  workflow_url:
    required: true
  report_url:
    required: true

runs:
  using: composite
  steps:
    - name: Set dynamic variables
      id: vars
      shell: bash
      run: |
        if [ "${{ inputs.status }}" == "success" ]; then
          echo "COLOR=#16a34a" >> $GITHUB_ENV
          echo "TITLE=Pipeline Success" >> $GITHUB_ENV
          echo "EMAIL_TITLE=Pipeline Success" >> $GITHUB_ENV
          echo "SUBJECT=[CI SUCCESS] ${{ inputs.pipeline_name }} PASSED - ${{ inputs.repository_name }}" >> $GITHUB_ENV
        else
          echo "COLOR=#b91c1c" >> $GITHUB_ENV
          echo "TITLE=Pipeline Failure" >> $GITHUB_ENV
          echo "EMAIL_TITLE=Pipeline Failure" >> $GITHUB_ENV
          echo "SUBJECT=[CI ALERT] ${{ inputs.pipeline_name }} FAILED - ${{ inputs.repository_name }}" >> $GITHUB_ENV
        fi

    - name: Debug Secret Connectivity
      shell: bash
      run: |
        if [ -z "${{ inputs.slack_webhook }}" ]; then echo "DEBUG: Slack Webhook is MISSING"; else echo "DEBUG: Slack Webhook is present"; fi
        if [ -z "${{ inputs.smtp_password }}" ]; then echo "DEBUG: SMTP Password is MISSING"; else echo "DEBUG: SMTP Password is present"; fi

    - name: Send email
      uses: hilarion5/send-mail@v1
      continue-on-error: true
      with:
        smtp-server: ${{ inputs.smtp_server }}
        smtp-port: ${{ inputs.smtp_port }}
        smtp-secure: ${{ inputs.smtp_secure }}
        username: ${{ inputs.smtp_username }}
        password: ${{ inputs.smtp_password }}
        from-email: "VK Paints CI <${{ inputs.mail_from || inputs.smtp_username }}>"
        to-email: ${{ inputs.mail_to }}
        subject: ${{ env.SUBJECT }}
        html: |
          <div style="padding:24px;background:#f4f7fb;font-family:Arial;">
            <h2 style="color:${{ env.COLOR }};">${{ env.EMAIL_TITLE }}</h2>
            <p><b>Pipeline:</b> ${{ inputs.pipeline_name }}</p>
            <p><b>Repository:</b> ${{ inputs.repository_name }}</p>
            <p><b>Author:</b> ${{ inputs.author }}</p>
            <p><b>Details:</b> ${{ inputs.reason_or_message }}</p>
            <br/>
            <a href="${{ inputs.report_url }}" style="padding:12px 18px;background:#2563eb;color:#fff;text-decoration:none;border-radius:6px;">View Report</a>
            <br/><br/>
            <a href="${{ inputs.workflow_url }}" style="padding:10px 14px;background:#111;color:#fff;text-decoration:none;border-radius:6px;">View Workflow</a>
          </div>

    - name: Post to Slack
      uses: slackapi/slack-github-action@v2.0.0
      with:
        webhook: ${{ inputs.slack_webhook }}
        webhook-type: incoming-webhook
        payload: |
          {
            "text": "${{ env.TITLE }}: ${{ inputs.pipeline_name }} for ${{ inputs.repository_name }}",
            "attachments": [
              {
                "color": "${{ env.COLOR }}",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*${{ env.TITLE }}*\n*Repo:* ${{ inputs.repository_name }}\n*Details:* ${{ inputs.reason_or_message }}\n<${{ inputs.workflow_url }}|View Workflow>"
                    }
                  }
                ]
              }
            ]
          }
