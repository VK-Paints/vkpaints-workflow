name: Reusable PR Scans (SonarQube & Snyk)

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Name of the microservice'
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true
      SNYK_TOKEN:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      SLACK_WEBHOOK:
        required: true

jobs:
  sonar-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  snyk-scan:
    name: Snyk Vulnerability Scan
    needs: sonar-scan # Only runs if SonarQube passes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  notify-result:
    name: Send Notification
    needs: [sonar-scan, snyk-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine Failure Reason
        id: reason
        run: |
          if [ "${{ needs.sonar-scan.result }}" == "failure" ]; then
            echo "msg=SonarQube Quality Gate failed! Review code smells or vulnerabilities." >> $GITHUB_OUTPUT
            echo "url=${{ vars.SONAR_HOST_URL }}/dashboard?id=${{ vars.SONAR_PROJECT_KEY }}" >> $GITHUB_OUTPUT
          elif [ "${{ needs.snyk-scan.result }}" == "failure" ]; then
            echo "msg=Snyk Security Scan found high-severity vulnerabilities in dependencies." >> $GITHUB_OUTPUT
            echo "url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          elif [ "${{ contains(needs.*.result, 'failure') }} " == "true" ]; then
            echo "msg=Pipeline failed during the scanning phase (possible secret or setup error)." >> $GITHUB_OUTPUT
            echo "url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          else
            echo "msg=All scans passed! SonarQube and Snyk are green." >> $GITHUB_OUTPUT
            echo "url=${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Workflow Repo (for action access)
        uses: actions/checkout@v4
        with:
          repository: VK-Paints/vkpaints-workflow
          token: ${{ secrets.ORG_GH_TOKEN }}
          ref: main

      - name: Send Notification
        uses: ./.github/actions/notify
        with:
          status: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}
          pipeline_name: 'PR Scans (Sonar & Snyk)'
          repository_name: ${{ github.repository }}
          reason_or_message: ${{ steps.reason.outputs.msg }}
          author: ${{ github.actor }}
          smtp_username: ${{ secrets.SMTP_USERNAME }}
          smtp_password: ${{ secrets.SMTP_PASSWORD }}
          smtp_server: ${{ vars.SMTP_SERVER }}
          smtp_port: ${{ vars.SMTP_PORT }}
          mail_from: ${{ vars.MAIL_FROM }}
          mail_to: ${{ github.actor }}@users.noreply.github.com
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          workflow_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          report_url: ${{ steps.reason.outputs.url }}
