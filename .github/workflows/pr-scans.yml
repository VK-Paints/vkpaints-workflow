name: Reusable PR Scans (SonarQube & Snyk)

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Name of the microservice'
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true
      SNYK_TOKEN:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      SLACK_WEBHOOK:
        required: true

jobs:
  sonar-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.host.url=${{ vars.SONAR_HOST_URL }}

  snyk-scan:
    name: Snyk Vulnerability Scan
    needs: sonar-scan # Only runs if SonarQube passes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  docker-build-test:
    name: Docker Build Validation
    needs: snyk-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker Build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # We only want to test if it builds, NOT push to registry
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-result:
    name: Send Notification
    needs: [sonar-scan, snyk-scan, docker-build-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Workflow Repo (for action access)
        uses: actions/checkout@v4
        with:
          repository: VK-Paints/vkpaints-workflow

      - name: Get Author Email
        id: author
        shell: bash
        run: echo "email=$(git log -1 --pretty=format:'%ae')" >> $GITHUB_OUTPUT

      - name: Send Notification
        uses: ./.github/actions/notify
        with:
          status: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}
          pipeline_name: 'PR Scans (Sonar, Snyk & Docker)'
          repository_name: ${{ github.repository }}
          reason_or_message: 'Results: Sonar [${{ needs.sonar-scan.result }}], Snyk [${{ needs.snyk-scan.result }}], Docker [${{ needs.docker-build-test.result }}]'
          author: ${{ github.actor }}
          smtp_server: ${{ vars.SMTP_SERVER }}
          smtp_port: ${{ vars.SMTP_PORT }}
          smtp_username: ${{ secrets.SMTP_USERNAME }}
          smtp_password: ${{ secrets.SMTP_PASSWORD }}
          mail_from: ${{ vars.MAIL_FROM }}
          mail_to: ${{ steps.author.outputs.email }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          workflow_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          report_url: '${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
