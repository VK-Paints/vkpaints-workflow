name: Reusable Build and Push (RELEASE)

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Name of the microservice'
        required: true
        type: string
    secrets:
      ORG_GH_TOKEN:
        description: 'GitHub PAT'
        required: false
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      SLACK_WEBHOOK:
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vkpaints-${{ inputs.service_name }}

jobs:
  build-and-push-release:
    name: Build and Push Release Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # This automatically creates a tag based on the GitHub release tag (e.g., v1.0.0)
          tags: |
            type=semver,pattern={{version}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  notify-result:
    name: Send Notification
    needs: [build-and-push-release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Workflow Repo (for action access)
        uses: actions/checkout@v4
        with:
          repository: VK-Paints/vkpaints-workflow

      - name: Get Author Email
        id: author
        shell: bash
        run: echo "email=$(git log -1 --pretty=format:'%ae')" >> $GITHUB_OUTPUT

      - name: Send Notification
        uses: ./.github/actions/notify
        with:
          status: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}
          pipeline_name: 'Release Build'
          repository_name: ${{ github.repository }}
          reason_or_message: 'Release build and push to GHCR'
          author: ${{ github.actor }}
          smtp_server: ${{ vars.SMTP_SERVER }}
          smtp_port: ${{ vars.SMTP_PORT }}
          smtp_username: ${{ secrets.SMTP_USERNAME }}
          smtp_password: ${{ secrets.SMTP_PASSWORD }}
          mail_from: ${{ vars.MAIL_FROM }}
          mail_to: ${{ steps.author.outputs.email }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          workflow_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          report_url: '${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}'
