name: Reusable Build and Push (RELEASE)

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Name of the microservice'
        required: true
        type: string
    secrets:
      ORG_GH_TOKEN:
        description: 'GitHub PAT with repo permissions for updating Helm charts'
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      SLACK_WEBHOOK:
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vkpaints_${{ inputs.service_name }}

jobs:
  build-and-push-release:
    name: Build and Push Release Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Export Release Tag
        id: export_tag
        run: |
          # Extract the tag (e.g., v1.0.0) from the github ref
          echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

  update-helm:
    name: Update Helm Chart (Prod & Dev Values)
    needs: build-and-push-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Helm Chart Repo
        uses: actions/checkout@v4
        with:
          repository: VK-Paints/vkpaints-helm-charts
          token: ${{ secrets.ORG_GH_TOKEN }}
          path: helm-repo
          ref: main

      - name: Update values-prod.yaml and values-dev.yaml
        run: |
          cd helm-repo
          RELEASE_TAG=${GITHUB_REF#refs/tags/}
          
          # Update PROD values
          yq -i '.image.tag = "'$RELEASE_TAG'"' charts/${{ inputs.service_name }}/values-prod.yaml
          
          # Update DEV values (as requested)
          yq -i '.image.tag = "'$RELEASE_TAG'"' charts/${{ inputs.service_name }}/values-dev.yaml
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add charts/${{ inputs.service_name }}/values-prod.yaml charts/${{ inputs.service_name }}/values-dev.yaml
          git commit -m "Release: Update ${{ inputs.service_name }} images to $RELEASE_TAG" || echo "No changes to commit"
          git push

  notify-result:
    name: Send Notification
    needs: [build-and-push-release, update-helm]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Determine Failure Reason
        id: reason
        run: |
          if [ "${{ needs.build-and-push-release.result }}" == "failure" ]; then
            echo "msg=Production Image Build failed! Check the logs for compilation or Docker errors." >> $GITHUB_OUTPUT
            echo "url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          elif [ "${{ needs.update-helm.result }}" == "failure" ]; then
            echo "msg=ArgoCD Production release failed! Could not update the Helm charts for Prod/Dev environments." >> $GITHUB_OUTPUT
            echo "url=${{ github.server_url }}/VK-Paints/vkpaints-helm-charts" >> $GITHUB_OUTPUT
          else
            echo "msg=Production Release successful! Version pushed to GHCR and all environments updated." >> $GITHUB_OUTPUT
            echo "url=${{ github.server_url }}/${{ github.repository }}/releases" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Workflow Repo
        uses: actions/checkout@v4
        with:
          repository: VK-Paints/vkpaints-workflow
          token: ${{ secrets.ORG_GH_TOKEN }}
          ref: main

      - name: Send Notification
        uses: ./.github/actions/notify
        with:
          status: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}
          pipeline_name: 'Production Release Build & Deploy'
          repository_name: ${{ github.repository }}
          reason_or_message: ${{ steps.reason.outputs.msg }}
          author: ${{ github.actor }}
          smtp_username: ${{ secrets.SMTP_USERNAME }}
          smtp_password: ${{ secrets.SMTP_PASSWORD }}
          smtp_server: ${{ vars.SMTP_SERVER }}
          smtp_port: ${{ vars.SMTP_PORT }}
          mail_from: ${{ vars.MAIL_FROM }}
          mail_to: ${{ github.actor }}@users.noreply.github.com
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          workflow_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          report_url: ${{ steps.reason.outputs.url }}
